<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Button Examples — Making Sense DS</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  body { font-family: var(--font-sans); padding: 32px; background: var(--bg-0); color: var(--fg-1); }
  h2 { font: var(--h3); margin: 0 0 20px; letter-spacing: var(--ls-snug); }
  .group { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 32px; }
  .label { font: var(--caption); letter-spacing: var(--ls-eyebrow); text-transform: uppercase; color: var(--fg-3); margin-bottom: 8px; }

  /* Base button */
  .btn {
    font-family: var(--font-sans);
    font-size: var(--fs-12);
    font-weight: 800;
    letter-spacing: var(--ls-eyebrow);
    text-transform: uppercase;
    padding: 14px 26px;
    border-radius: var(--radius-pill); /* always pill */
    border: 1.5px solid transparent;
    cursor: pointer;
    transition: box-shadow var(--dur-base) var(--ease-out),
                transform var(--dur-base) var(--ease-out);
    display: inline-flex;
    align-items: center;
  }

  /* Gradient CTA — primary */
  .btn-gradient {
    background: var(--ms-gradient);
    color: var(--ms-dark); /* always dark-blue, never white */
  }
  .btn-gradient:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }

  /* Primary dark */
  .btn-primary { background: var(--ms-dark); color: #fff; font-weight: 700; }
  .btn-primary:hover { background: #000; box-shadow: var(--shadow-md); transform: translateY(-1px); }

  /* Ghost */
  .btn-ghost {
    background: transparent;
    border-color: var(--ms-grey-300);
    color: var(--ms-dark);
    font-weight: 700;
  }
  .btn-ghost:hover { background: var(--ms-grey-50); border-color: var(--ms-grey-500); }

  /* Link */
  .btn-link {
    background: transparent; border: none; padding: 10px 0;
    color: var(--ms-blue-deep); font-weight: 600; border-radius: 0;
  }
  .btn-link:hover { text-decoration: underline; text-underline-offset: 3px; }

  /* On dark */
  .dark-bg { background: var(--ms-dark); padding: 24px; border-radius: var(--radius-lg); }
</style>
</head>
<body>
  <h2>Buttons</h2>

  <div class="label">Gradient CTA (primary)</div>
  <div class="group">
    <button class="btn btn-gradient">Get started</button>
    <button class="btn btn-gradient" style="font-size:var(--fs-14);padding:16px 32px;">Let's talk</button>
  </div>

  <div class="label">Primary dark</div>
  <div class="group">
    <button class="btn btn-primary">Contact us</button>
    <button class="btn btn-primary" style="padding:12px 20px;font-size:11px;">Learn more</button>
  </div>

  <div class="label">Ghost / outlined</div>
  <div class="group">
    <button class="btn btn-ghost">See all services</button>
  </div>

  <div class="label">Link</div>
  <div class="group">
    <button class="btn btn-link">Read case study</button>
  </div>

  <div class="label">On dark background</div>
  <div class="dark-bg group">
    <button class="btn btn-gradient">Book a call</button>
    <button class="btn" style="background:transparent;border-color:rgba(255,255,255,0.3);color:#fff;font-weight:700;">Learn more</button>
  </div>
</body>
</html>
